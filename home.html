<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in | A-5</title>
    <link rel="shortcut icon" href="./assets/logo.jpg" type="image/x-icon">
    <!-- daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <header id="nav-bar" class="bg-base-100 shadow-sm glass sticky top-0 z-50 backdrop-blur-md">
        <div class="navbar w-full md:w-11/12 lg:w-10/12 mx-auto">
            <div class="flex-1 items-center gap-1 justify-start cursor-pointer">
                <div class="flex items-center justify-start gap-1">
                    <img src="./assets/github-logo.png" alt="" class="w-10">
                    <a class="text-xl hidden sm:inline-block font-semibold">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="navbar-end flex gap-[2px]">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchBox" type="search" required placeholder="Search issues..." />
                </label>
                <div class="">
                    <a class="btn btn-primary" id="search">Search</a>
                </div>
            </div>
        </div>
    </header>
    <main class="w-full md:w-11/12 lg:w-10/12 mx-auto my-5">
        <!-- Action Buttons -->
        <section id="action-btn" class="p-5 bg-base-100 border border-neutral/10 shadow-sm rounded-lg my-5">
            <button class="btn btn-primary w-30">All</button>
            <button class="btn w-30">Open</button>
            <button class="btn w-30">Closed</button>
        </section>



        <!-- Issue Information -->
        <section id="issue-info"
            class="flex justify-between  py-3 px-5 bg-base-100 border border-neutral/10 shadow-sm rounded-lg">
            <div class="flex items-center gap-2">
                <img src="./assets/Aperture.png" alt="" class="bg-primary/10 p-2 rounded-full">
                <div>
                    <h2 class="font-bold text-xl"><span id="issue-number">50</span> Issues</h2>
                    <p class="text-neutral/50">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div>
                    <span class="w-3 h-3 bg-[#00A96E]  rounded-full inline-block"></span>
                    <span>Open</span>
                </div>
                <div>
                    <span class="w-3 h-3 bg-[#A855F7] rounded-full inline-block"></span>
                    <span>Closed</span>
                </div>
            </div>
        </section>


        <!-- Loading spinner -->
        <div class="p-30 text-center my-10 hidden" id="loading">
            <span class="loading loading-infinity loading-xl w-[10%] text-neutral/20 mx-auto"></span>
        </div>
        <!-- Issues Container -->
        <section id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 my-5">


            <!-- Issue Card -->


        </section>

        <!-- modal -->

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="issueDetail.showModal()">open modal</button> -->
        <dialog id="issueDetail" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="modal-details">
                    
                    <!-- details will be placed here -->

                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>
    <script src="./js/home.js"></script>
    <script src="./js/signIn.js"></script>
    <script src="./js/issuesContainer.js"></script>
    <script src="./js/detailIssue.js"></script>
    <script src="./js/search.js"></script>
</body>

</html>
